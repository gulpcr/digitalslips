<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDS Assistant</title>
  <link rel="stylesheet" href="../styles/popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="header-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="7" y1="8" x2="17" y2="8"/>
          <line x1="7" y1="12" x2="17" y2="12"/>
          <line x1="7" y1="16" x2="13" y2="16"/>
        </svg>
        <span>DDS Assistant</span>
      </div>
      <a href="#" id="settings-link" class="settings-icon" title="Settings">&#9881;</a>
    </div>

    <!-- Status Indicators -->
    <div class="status-bar">
      <div class="status-item">
        <span class="status-dot" id="ds-status"></span>
        <span>Digital Slips</span>
      </div>
      <div class="status-item">
        <span class="status-dot" id="transact-status"></span>
        <span>Transact</span>
      </div>
    </div>

    <!-- User Info -->
    <div id="user-info" class="user-info hidden"></div>

    <!-- Quick Lookup -->
    <div class="section">
      <div class="input-group">
        <input type="text" id="drid-input" class="input" placeholder="Enter DRID..." autocomplete="off"/>
        <button id="lookup-btn" class="btn btn-primary">Go</button>
      </div>
      <div id="lookup-result"></div>
    </div>

    <!-- Queue -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Slip Queue</span>
        <span class="badge" id="queue-count">0</span>
      </div>
      <div id="queue-list" class="queue-list"></div>
      <button id="process-next-btn" class="btn btn-secondary btn-full hidden">Process Next</button>
    </div>

    <!-- Audit Log -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Recent Activity</span>
        <button id="export-csv-btn" class="btn-link">Export CSV</button>
      </div>
      <div id="audit-list" class="audit-list"></div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <button id="open-transact-btn" class="btn btn-secondary btn-sm">Open Transact</button>
      <span class="version" id="version-text"></span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
